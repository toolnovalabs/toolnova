<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}ToolNova{% endblock %}</title>
    <style>
        *{box-sizing:border-box}
        :root{
            --bg:#f8fafc;
            --card:#ffffff;
            --text:#0f172a;
            --muted:#64748b;
            --line:#e2e8f0;
            --nav:#0f172a;
            --primary:#2563eb;
            --green:#059669;
            --orange:#ea580c;
            --purple:#7c3aed;
            --shadow:0 12px 30px rgba(15,23,42,.08);
            --radius:18px;
            --max:1200px;
        }
        body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
        .nav{background:var(--nav);color:#fff;position:sticky;top:0;z-index:20}
        .nav-inner{max-width:var(--max);margin:0 auto;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:20px}
        .brand{color:#fff;text-decoration:none;font-size:28px;font-weight:800;white-space:nowrap}
        .nav-links{display:flex;gap:18px;flex-wrap:wrap}
        .nav-links a{color:#fff;text-decoration:none;font-size:15px;opacity:.92}
        .page{max-width:var(--max);margin:0 auto;padding:28px 22px 56px}
        .hero{color:#fff;border-radius:24px;padding:28px;margin-bottom:24px;box-shadow:var(--shadow)}
        .hero h1{margin:0 0 8px;font-size:42px;line-height:1.1}
        .hero p{margin:0;color:rgba(255,255,255,.9);font-size:16px;line-height:1.7;max-width:760px}
        .grid-2{display:grid;grid-template-columns:1.2fr .8fr;gap:22px}
        .card,.category-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
        .card h2,.card h3{margin:0 0 10px}
        .muted{color:var(--muted)}
        .tool-list{display:grid;gap:12px}
        .tool-item{border:1px solid var(--line);background:#f8fafc;border-radius:14px;padding:14px 16px}
        .tool-item strong{display:block;margin-bottom:4px}
        .form-block{padding:18px;border:1px solid var(--line);border-radius:16px;background:#fbfdff;margin-bottom:16px}
        .form-block h3{margin:0 0 8px;font-size:22px}
        .field{margin-bottom:12px}
        label{display:block;font-size:14px;margin-bottom:6px;color:var(--muted)}
        input,select,textarea,button{width:100%;font-size:15px;border-radius:12px}
        input,select,textarea{border:1px solid #cbd5e1;padding:12px 14px;background:#fff}
        textarea{min-height:120px;resize:vertical}
        button{border:none;padding:14px 16px;color:#fff;font-weight:700;cursor:pointer}
        .btn-blue{background:var(--primary)}
        .btn-green{background:var(--green)}
        .btn-purple{background:var(--purple)}
        .btn-orange{background:var(--orange)}
        .result{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;padding:16px;border-radius:14px;font-weight:700;white-space:pre-wrap;overflow:auto}
        .error{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;padding:14px;border-radius:14px;font-weight:700;margin-top:14px}
        .upload-box{border:2px dashed #bfdbfe;background:#eff6ff;padding:16px;border-radius:14px;margin-bottom:12px}
        .category-card a{color:var(--primary);text-decoration:none;font-weight:700}
        .table-view{width:100%;border-collapse:collapse}
        .table-view th,.table-view td{padding:8px 10px;border:1px solid #ddd;text-align:left;font-size:14px}
        @media (max-width:980px){
            .grid-2{grid-template-columns:1fr}
            .hero h1{font-size:34px}
            .nav-links{display:none}
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="nav-inner">
            <a href="/" class="brand">ToolNova</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/pdf">PDF Tools</a>
                <a href="/image">Image Tools</a>
                <a href="/office">Office Tools</a>
                <a href="/units">Unit Converter</a>
                <a href="/utility">Utility Tools</a>
            </div>
        </div>
    </div>

    <div class="page">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
